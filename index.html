<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>

    <link rel="stylesheet" href="index.css">
</head>
<body>


<form action="sucker.php" method="post">
  <dl>
    <dt>Name</dt>
    <dd><input type="text" name="name"></dd>

    <dt>Section</dt>
    <dd>
      <select name="section">
        <option value="">(Select a section)</option>
        <option>MA</option><option>MB</option><option>MC</option><option>MD</option>
        <option>ME</option><option>MF</option><option>MG</option><option>MH</option>
      </select>
    </dd>

    <dt>Credit Card</dt>
    <dd>
      <input type="text" name="cardnumber"><br>
      <label><input type="radio" name="cardtype" value="visa">Visa</label>
      <label><input type="radio" name="cardtype" value="mastercard">MasterCard</label>
    </dd>
  </dl>
  <div><input type="submit" value="I am a giant sucker."></div>
</form>

</body>
</html>
